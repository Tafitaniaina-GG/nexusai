name: Build NexusAI APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install app dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build
        env:
          NEXT_PUBLIC_ENC_URL: ${{ secrets.NEXT_PUBLIC_ENC_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}

      - name: Install Capacitor packages
        run: |
          npm install --save \
            @capacitor/core \
            @capacitor/android \
            @capacitor/status-bar \
            @capacitor/keyboard \
            @capacitor/splash-screen
          npm install --save-dev @capacitor/cli

      - name: Capacitor sync
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Copy app icons
        run: |
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${size}
          done
          cp public/icons/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png 2>/dev/null || true
          cp public/icons/icon-192.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png 2>/dev/null || true
          cp public/icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png 2>/dev/null || true
          cp public/icons/icon-512.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png 2>/dev/null || true

      - name: Grant Gradle execute permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename & move APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/NexusAI-v1.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusAI-APK
          path: release/NexusAI-v1.0.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "✦ NexusAI v1.0.${{ github.run_number }}"
          body: |
            ## ✦ NexusAI — Release automatique

            ### Modèles inclus
            - ⚡ **OpenAI** : GPT-5, GPT-4.1, o3, o4-mini, DALL·E 3
            - 🧠 **Chipp AI** : Gemini 2.5 Pro, 2.0 Flash — Fichiers & Images
            - 🔀 **RTM Router** : DeepSeek v3.1, Kimi K2, Llama 4, Qwen 3 (30+ modèles)
            - 🚀 **Groq** : Llama 3.3 70B, Kimi K2, GPT-OSS 120B (ultra-rapide)
            - 📥 **Facebook DL** : Téléchargement vidéo HD

            ### Installation Android
            1. Télécharger `NexusAI-v1.0.apk`
            2. Paramètres → Sécurité → Sources inconnues → Activer
            3. Ouvrir et installer l'APK
          files: release/NexusAI-v1.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
