<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#F72585"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06FFA5"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  
  <!-- Center glow -->
  <circle cx="256" cy="256" r="200" fill="url(#center-glow)"/>
  
  <!-- Outer ring - gradient -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring1)" stroke-width="3" opacity="0.6"/>
  
  <!-- Middle ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring2)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>
  
  <!-- Orbit dots on outer ring -->
  <circle cx="436" cy="256" r="6" fill="#00E5FF" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="76" cy="256" r="4" fill="#F72585" filter="url(#softglow)" opacity="0.8"/>
  <circle cx="256" cy="76" r="5" fill="#7C3AED" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="256" cy="436" r="4" fill="#06FFA5" filter="url(#softglow)" opacity="0.8"/>
  
  <!-- Diagonal dots -->
  <circle cx="383" cy="129" r="4" fill="#00E5FF" opacity="0.5"/>
  <circle cx="129" cy="383" r="3" fill="#F72585" opacity="0.5"/>
  <circle cx="383" cy="383" r="4" fill="#06FFA5" opacity="0.5"/>
  <circle cx="129" cy="129" r="3" fill="#7C3AED" opacity="0.5"/>
  
  <!-- Central ✦ star symbol -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <!-- Vertical bar of ✦ -->
    <path d="M0,-75 C2,-40 2,-20 0,0 C-2,-20 -2,-40 0,-75Z" fill="url(#star)"/>
    <path d="M0,75 C2,40 2,20 0,0 C-2,20 -2,40 0,75Z" fill="url(#star)"/>
    <!-- Horizontal bar of ✦ -->
    <path d="M-75,0 C-40,2 -20,2 0,0 C-20,-2 -40,-2 -75,0Z" fill="url(#star)"/>
    <path d="M75,0 C40,2 20,2 0,0 C20,-2 40,-2 75,0Z" fill="url(#star)"/>
    <!-- Diagonal bars (smaller) -->
    <path d="M-40,-40 C-20,-20 -8,-8 0,0 C-8,-8 -20,-20 -40,-40Z" fill="#00E5FF" opacity="0.7"/>
    <path d="M40,40 C20,20 8,8 0,0 C8,8 20,20 40,40Z" fill="#00E5FF" opacity="0.7"/>
    <path d="M40,-40 C20,-20 8,-8 0,0 C8,-8 20,-20 40,-40Z" fill="#7C3AED" opacity="0.7"/>
    <path d="M-40,40 C-20,20 -8,8 0,0 C-8,8 -20,20 -40,40Z" fill="#7C3AED" opacity="0.7"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.95"/>
  </g>
  
  <!-- Grid dots (subtle) -->
  <circle cx="180" cy="180" r="2" fill="#00E5FF" opacity="0.2"/>
  <circle cx="332" cy="180" r="2" fill="#00E5FF" opacity="0.2"/>
  <circle cx="180" cy="332" r="2" fill="#00E5FF" opacity="0.2"/>
  <circle cx="332" cy="332" r="2" fill="#00E5FF" opacity="0.2"/>
  
  <!-- Bottom text -->
  <text x="256" y="480" text-anchor="middle" font-family="'Arial', sans-serif" font-size="28" font-weight="bold" fill="white" opacity="0.7" letter-spacing="8">NEXUS</text>
</svg>
